<div mat-dialog-title>
    <h2>Create Firewire Project</h2>
    <div>{{data.fieldwireProject.name}}</div>
</div>

<mat-dialog-content>
    <div class="project-create-grid">
        <mat-form-field>
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="model.name" />
        </mat-form-field>
        <mat-form-field *ngIf="shouldShowProjectNbrInput()">
            <mat-label>Project Number</mat-label>
            <input matInput [(ngModel)]="model.projectNbr" />
        </mat-form-field>
        <mat-form-field>
            <mat-label>Bid Due Date</mat-label>
            <input matInput type="date" [(ngModel)]="model.bidDueDate" />
        </mat-form-field>
        <mat-form-field>
            <mat-label>Project Status</mat-label>
            <mat-select [(ngModel)]="model.projectStatus">
                <mat-option *ngFor="let option of getActiveSettings('projectStatus')" [value]="option.label">{{option.label}}</mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Total Sq Ft</mat-label>
            <input matInput type="number" min="0" [(ngModel)]="model.totalSqFt" />
        </mat-form-field>
        <mat-form-field>
            <mat-label>Salesman</mat-label>
            <input matInput [(ngModel)]="model.salesman" />
        </mat-form-field>
        <mat-form-field>
            <mat-label>Job Type</mat-label>
            <mat-select [(ngModel)]="model.jobType">
                <mat-option [value]="''">None</mat-option>
                <mat-option *ngFor="let option of getActiveSettings('jobType')" [value]="option.label">{{option.label}}</mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Scope Type</mat-label>
            <mat-select [(ngModel)]="model.scopeType">
                <mat-option [value]="''">None</mat-option>
                <mat-option *ngFor="let option of getActiveSettings('scopeType')" [value]="option.label">{{option.label}}</mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Difficulty</mat-label>
            <mat-select [(ngModel)]="model.difficulty">
                <mat-option [value]="''">None</mat-option>
                <mat-option *ngFor="let option of getActiveSettings('difficulty')" [value]="option.label">{{option.label}}</mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field class="project-address-field">
            <mat-label>Address</mat-label>
            <input matInput [(ngModel)]="model.address" />
        </mat-form-field>
        <mat-form-field class="project-scope-field">
            <mat-label>Project Scope</mat-label>
            <mat-select [(ngModel)]="model.projectScope">
                <mat-option [value]="''">None</mat-option>
                <mat-option *ngFor="let option of getActiveSettings('projectScope')" [value]="option.label">{{option.label}}</mat-option>
            </mat-select>
        </mat-form-field>
    </div>
    <div *ngIf="saveError" class="project-create-status">{{saveError}}</div>
</mat-dialog-content>

<mat-dialog-actions>
    <button mat-button type="button" mat-dialog-close [disabled]="saveWorking">Cancel</button>
    <button mat-flat-button type="button" (click)="submit()" [disabled]="saveWorking">Create</button>
</mat-dialog-actions>
