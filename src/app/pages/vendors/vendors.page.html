<page-toolbar>
    <div class="button-bar">
        <button mat-fab class="back" [routerLink]="'/home'">
            <mat-icon fontIcon="chevron_left"></mat-icon>
        </button>
    </div>
    <nav-toolbar [navItems]="navItems" [selectedItem]="'vendors'"></nav-toolbar>
</page-toolbar>
<div class="page-root">
    <div class="page-content">
        <div class="tabstrip">
            <mat-form-field>
                <mat-label>Filter</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Strobe" #input>
            </mat-form-field>
            <span *ngIf="statusText" class="project-create-status">{{statusText}}</span>
        </div>
        <div class="content-root with-tabstrip">
            <table mat-table [dataSource]="datasource" matSort>

                <ng-container matColumnDef="logo" sticky="true">
                    <th mat-header-cell *matHeaderCellDef> Logo </th>
                    <td mat-cell *matCellDef="let row">
                        <div class="vendor-logo-cell">
                            <img *ngIf="row.logoDataUrl" class="vendor-logo-cell__image" [src]="row.logoDataUrl" [alt]="row.name + ' logo'" />
                            <div *ngIf="!row.logoDataUrl" class="vendor-logo-cell__placeholder">No Logo</div>
                        </div>
                    </td>
                </ng-container>

                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                    <td mat-cell *matCellDef="let row">
                        <input *ngIf="isEditing(row)" class="vendor-inline-edit__input" [(ngModel)]="editModel.name" />
                        <ng-container *ngIf="!isEditing(row)">{{row.name}}</ng-container>
                    </td>
                </ng-container>

                <!-- Description Column -->
                <ng-container matColumnDef="desc">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Description </th>
                    <td mat-cell *matCellDef="let row">
                        <input *ngIf="isEditing(row)" class="vendor-inline-edit__input vendor-inline-edit__input--wide" [(ngModel)]="editModel.desc" />
                        <ng-container *ngIf="!isEditing(row)">{{row.desc}}</ng-container>
                    </td>
                </ng-container>

                <!-- Link Column -->
                <ng-container matColumnDef="link">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Link </th>
                    <td mat-cell *matCellDef="let row">
                        <input *ngIf="isEditing(row)" class="vendor-inline-edit__input vendor-inline-edit__input--wide" [(ngModel)]="editModel.link" />
                        <ng-container *ngIf="!isEditing(row)">{{row.link}}</ng-container>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef style="width: 280px;"></th>
                    <td mat-cell *matCellDef="let row" style="width: 280px;">
                        <div class="project-nbr-inline-edit__actions">
                            <input #logoInput type="file" accept="image/*" class="vendor-logo-upload__input" (change)="onLogoSelected(row, $event)" />
                            <button
                                *ngIf="!isEditing(row)"
                                mat-icon-button
                                type="button"
                                [disabled]="saveWorking || !!editingVendorId"
                                (click)="startEdit(row)">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button
                                *ngIf="!isEditing(row)"
                                mat-icon-button
                                type="button"
                                [disabled]="saveWorking || !!editingVendorId"
                                (click)="logoInput.click()"
                                title="Upload vendor logo">
                                <mat-icon>image</mat-icon>
                            </button>
                            <button
                                *ngIf="!isEditing(row)"
                                mat-icon-button
                                type="button"
                                [disabled]="saveWorking || !!editingVendorId"
                                (click)="openImportConfig(row)"
                                title="Configure import rules">
                                <mat-icon>tune</mat-icon>
                            </button>
                            <button
                                *ngIf="isEditing(row)"
                                mat-flat-button
                                type="button"
                                class="project-nbr-inline-edit__save"
                                [disabled]="saveWorking"
                                (click)="saveEdit()">
                                Save
                            </button>
                            <button
                                *ngIf="isEditing(row)"
                                mat-stroked-button
                                type="button"
                                class="project-nbr-inline-edit__cancel"
                                [disabled]="saveWorking"
                                (click)="cancelEdit()">
                                Cancel
                            </button>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <!-- Row shown when there is no matching data. -->
                <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="5">{{getNoDataRowText(input.value)}}</td>
                </tr>
            </table>

            <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of devices"></mat-paginator>

        </div>
    </div>

</div>
